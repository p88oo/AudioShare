name: 编译 AudioShare (适配 Android 16)

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Gradle 并初始化包装器
        run: |
          gradle wrapper --gradle-version 8.7
          chmod +x gradlew

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 编译 Release APK
        run: ./gradlew assembleRelease --no-build-cache --no-daemon

      - name: 上传 APK 成品
        uses: actions/upload-artifact@v4
        with:
          name: AudioShare-Android16-适配版
          path: app/build/outputs/apk/release/*.apk
