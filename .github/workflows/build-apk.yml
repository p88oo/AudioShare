name: 编译 AudioShare (适配 Android 16)

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./Android  # 强制进入安卓目录

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 授权 Gradle
        run: chmod +x gradlew

      - name: 编译 Debug APK
        run: ./gradlew assembleDebug

      - name: 上传 APK 成品
        uses: actions/upload-artifact@v4
        with:
          name: AudioShare-Android16-正式版
          path: app/build/outputs/apk/debug/*.apk
