name: 编译 AudioShare (适配 Android 16)

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android  # 这里是小写！！！

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 给 Gradle 加执行权限
        run: chmod +x gradlew

      - name: 编译 APK
        run: ./gradlew assembleDebug

      - name: 上传 APK 安装包
        uses: actions/upload-artifact@v4
        with:
          name: AudioShare-Android16-可用版
          path: android/app/build/outputs/apk/debug/*.apk
