name: 编译 AudioShare (适配 Android 16)

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Android  # 关键！进入 Android 目录
        
    steps:
      - uses: actions/checkout@v4

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
          cache-dependency-path: Android/build.gradle

      - name: 授权 Gradle
        run: chmod +x gradlew

      - name: 编译 Debug 包
        run: ./gradlew assembleDebug

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: AudioShare-Android16-完整版
          path: Android/app/build/outputs/apk/debug/*.apk
